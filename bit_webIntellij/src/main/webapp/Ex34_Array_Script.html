<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script type="text/javascript">
        //javascript의 Array -> java의 collection 과 같다

        let array = ['포도', '사과'];
        document.writeln(array.toString() + "<br>");
        document.writeln(array + "default toString()<br>");

        for (let i = 0; i < array.length; i++) {
            document.write(array[i] + "<br>");
        }
        document.write("<br>");
        for (let index in array) {
            document.write(array[index]);
            //let array= ['포도', '사과'];
            array[2] = "바나나";
            document.write(array.toString() + "-" + array.length + "<br>")

            array[10] = "애플망고";
            document.write(array.toString() + "-" + array.length + "<br>")

            let array2 = ["one", "two", "three"];

            array2.length = 2;
            document.write(array2.toString() + "-" + array2.length + "<br>")
            array2.length = 4;
            document.write(array2.toString() + "-" + array2.length + "<br>")

            //권장 방법
            //Array -> stack -> LIFO -> push(), pop()

            array2.push("fff");
            document.write(array2.toString() + "-" + array2.length + "<br>")

            //GOOD
            let list =[];
            list.push("A");
            list.push("B");
            list.push("C");
            list.push("D");
            document.write("<br> " + list.pop());

            //

        }
    </script>
</head>
<body>

</body>
</html>
