<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script type="text/javascript">
        //1. 배열 -> [] -> let arr = []; -> push(), pop();
        //2. json 객체 -> {} -> let obj = {}; -> obj.속성명, obj.함수명

        //우리가 원하는 데이터는 단순하지 않다.
        //객체가 객체를 가지거나, 객체 안에 배열, 배열 안에 객체 ... 혼합 -> 해석

        let students = []; //배열은 객체를 가질 수 있다.
        students.push({이름: "홍길동", 국어: 80, 영어: 60}) //[0] -> 객체가 존재
        students.push({이름: "아무개", 국어: 100, 영어: 50}) //[1] -> 객체가 존재
        students.push({이름: "이순신", 국어: 10, 영어: 100}) //[2] -> 객체가 존재

        // [{}, {}, {}]

        for (let index in students) {
            //students[index] -> {}
            students[index].getSum = function () {
                return this.국어 + this.영어;
            }
            students[index].getAvg = function () {
                return this.getSum() / 2;
            }
        }
        console.log(students);

        for (let index in students) {
            console.log(students[index].이름);
            console.log(students[index].getSum());
            console.log(students[index].getAvg());
        }

    </script>
</head>
<body>

</body>
</html>
