<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script type="text/javascript">
        //function(){} -> 익명함수: 이름이 없으니 다른곳에서 사용불가(1회성 함수)
        //callback 함수: 프로그램 논리(흐름)에 의해 자동으로 호출되는 함수 -> 1초마다 호출(재호출)
        let myTime = window.setInterval(function () {
            let d = new Date(); //java: Date d = new Date();
            let t = d.toLocaleTimeString(); //d.toLocaleTimeString() -> 시간정보를 문자로 리턴해줌
            document.getElementById("time").innerHTML = t;
        }, 1000); // -> 보통 익명함수 사용

        //myTime === setInterval (시간정보)
        function myTimeStop(){
            window.clearInterval(myTime);
        }
    </script>
</head>
<body>
<p id="time"></p>
<button onclick="myTimeStop()">Stop Time</button>
</body>
</html>
