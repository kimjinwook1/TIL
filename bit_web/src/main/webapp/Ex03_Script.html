<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dom을 사용하는 javascript</title>
    <script type="text/javascript">
        function democall() {
            let ele = document.getElementById("demo");
            console.log(ele);
            ele.innerHTML = "배고프다";
        }
    </script>
</head>
<body>
<button onclick="democall()">클릭하세요</button>
<p id="demo">demo라는 id는 p태그의 식별자 역할을 한다.</p>
</body>
</html>
