<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script type="text/javascript">
        /*
        onload 이벤트가 발생하는 시점: body 안에 있는 모든 요소가 브라우저에 DOM형태로 loading 되고 난 후에 발생

        function call(){} 함수가 있으면

        1. <body onload="call()">
        2. window.onload="call()">

        call 함수를 page loading 할 때 한 번만 쓰고 더이상 안 쓴다면?
        익명함수: 일회성함수 -> 재사용 불가
         */

        window.onload = function () {
            let out = "";
            out += "<ul>";
            out += "<li>script</li>";
            out += "<li>jquery</li>";
            out += "<li>vue</li>";

            document.body.innerHTML = out;

            //DOM -> 동적 -> 기존에 없던 것을 추가, 삭제, 변경
            let header = document.createElement("h1")
            //<h1></h1>
            let textnode = document.createTextNode("대한민국")
            //대한민국

            header.appendChild(textnode);
            //<h1>대한민국</h1>

            document.body.appendChild(header);

            //img 태그를 동적으로 생성하고 src 속성도 추가하고 body 자식으로 appeend 하자.
            let img = document.createElement("img"); //<img>
            img.setAttribute("src","images/target.jpg") //<img src="images/target.jpg">
            img.setAttribute("width", "100px");//<img src="images/target.jpg" width="100px">
            img.setAttribute("height", "100px");//<img src="images/target.jpg" width="100px" height="100px">
            document.body.appendChild(img);

        };
    </script>
</head>
<body>
Hello World
</body>
</html>
