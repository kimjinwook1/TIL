<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script type="text/javascript">
        let a = 8;
        if (a % 2 == 0) {
            document.write("짝수: " + a + "<br>");
        } else {
            document.write("홀수: " + a + "<br>");
        }

        let c = 7;
        if (c % 2 == 0) {
            document.write("2의 배수" + "<br>");
        } else if (c % 3 == 0) {
            document.write("3의 배수" + "<br>");
        } else {
            document.write("기타" + "<br>");
        }

        //1~100합
        //int sum =0;
        //for(int i = 0; i<=100; i++){sum+=i;}

        let sum = 0;
        for (let i = 0; i <= 100; i++) {
            sum += i;
        }
        document.write("sum: " + sum + "<hr>");

        //구구단 출력
        for (let i = 2; i < 10; i++) {
            for (let j = 1; j < 10; j++) {
                document.write(i + " * " + j + " = " + i * j + "<br>");
            }
            document.write("<br>")
        }
    </script>
</head>
<body>

</body>
</html>
